# Deploy workflow for ASISaga/subconscious.asisaga.com
#
# Copy this file to .github/workflows/deploy.yml in the subconscious.asisaga.com repository.
#
# Prerequisites — run once from ASISaga/aos-infrastructure:
#   1. Deploy infrastructure:  workflow_dispatch on infrastructure-deploy.yml
#      The Bicep templates create the Function App and its User-Assigned Managed
#      Identity, then store the identity clientId in Key Vault automatically.
#   2. Create GitHub Environments in THIS repo: dev, staging, prod
#   3. Add the following secrets to each environment:
#        AZURE_CLIENT_ID     — Managed identity client ID.
#                              Retrieve from Key Vault after infrastructure provisioning:
#                                python3 - <<'PYEOF'
#                                import os
#                                from azure.identity import DefaultAzureCredential
#                                from azure.keyvault.secrets import SecretClient
#                                cred = DefaultAzureCredential()
#                                secret = SecretClient(vault_url="https://<kv-name>.vault.azure.net", credential=cred)
#                                print(secret.get_secret("clientid-mcp-subconscious-<env>").value)
#                                PYEOF
#                              The Key Vault name is shown in the infrastructure deploy run summary.
#                              On the first run, the infra_provisioned repository_dispatch event
#                              triggers this workflow automatically with the client ID in the payload.
#        AZURE_TENANT_ID     — Azure AD tenant ID
#        AZURE_SUBSCRIPTION_ID — Azure subscription ID
#   4. Optionally add variable AZURE_RESOURCE_GROUP (defaults to rg-aos-<env>)
#
# See deployment/workflow-templates/README.md in ASISaga/aos-infrastructure for full setup guide.

name: Deploy to Azure

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
  # Triggered automatically by ASISaga/aos-infrastructure after successful
  # Function App provisioning (Bicep Phase 4).  The payload includes the
  # environment name and Key Vault URL so that this workflow can retrieve
  # AZURE_CLIENT_ID without any manual secret setup.
  repository_dispatch:
    types:
      - infra_provisioned

permissions:
  id-token: write
  contents: read

jobs:
  # GitHub Actions evaluates `if:` conditions that reference `needs.X.outputs.Y`
  # only AFTER the upstream job runs, but it validates the workflow structure at
  # planning time.  When every deploy job is gated on a `needs` output AND uses a
  # reusable workflow (`uses:`), GitHub rejects the entire workflow at planning
  # time — resulting in zero jobs and no error output (silent failure).
  #
  # Fix: use `github.event_name` / `github.event.*` / `inputs.*` directly in
  # the `if:` conditions.  These values are available at planning time so GitHub
  # can determine which deploy job to queue without waiting for a prior job.
  # The `resolve-env` intermediary job is no longer needed.

  deploy-dev:
    name: Deploy (dev)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.environment == 'dev')
    environment: dev
    uses: ASISaga/aos-infrastructure/.github/workflows/deploy-function-app.yml@main
    with:
      app-name: 'mcp-subconscious'
      environment: 'dev'
      key-vault-url: ${{ github.event.client_payload.key_vault_url || '' }}
    secrets: inherit

  deploy-staging:
    name: Deploy (staging)
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.environment == 'staging')
    environment: staging
    uses: ASISaga/aos-infrastructure/.github/workflows/deploy-function-app.yml@main
    with:
      app-name: 'mcp-subconscious'
      environment: 'staging'
      key-vault-url: ${{ github.event.client_payload.key_vault_url || '' }}
    secrets: inherit

  deploy-prod:
    name: Deploy (prod)
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.environment == 'prod')
    environment: prod
    uses: ASISaga/aos-infrastructure/.github/workflows/deploy-function-app.yml@main
    with:
      app-name: 'mcp-subconscious'
      environment: 'prod'
      key-vault-url: ${{ github.event.client_payload.key_vault_url || '' }}
    secrets: inherit
