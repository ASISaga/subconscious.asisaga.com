# Deploy workflow for ASISaga/subconscious.asisaga.com
#
# Copy this file to .github/workflows/deploy.yml in the subconscious.asisaga.com repository.
#
# Prerequisites — run once from ASISaga/aos-infrastructure:
#   1. Deploy infrastructure:  workflow_dispatch on infrastructure-deploy.yml
#      The Bicep templates create the Function App and its User-Assigned Managed
#      Identity, then store the identity clientId in Key Vault automatically.
#   2. Create GitHub Environments in THIS repo: dev, staging, prod
#   3. Add the following secrets to each environment:
#        AZURE_CLIENT_ID     — Managed identity client ID.
#                              Retrieve from Key Vault after infrastructure provisioning:
#                                python3 - <<'PYEOF'
#                                import os
#                                from azure.identity import DefaultAzureCredential
#                                from azure.keyvault.secrets import SecretClient
#                                cred = DefaultAzureCredential()
#                                secret = SecretClient(vault_url="https://<kv-name>.vault.azure.net", credential=cred)
#                                print(secret.get_secret("clientid-mcp-subconscious-<env>").value)
#                                PYEOF
#                              The Key Vault name is shown in the infrastructure deploy run summary.
#                              On the first run, the infra_provisioned repository_dispatch event
#                              triggers this workflow automatically with the client ID in the payload.
#        AZURE_TENANT_ID     — Azure AD tenant ID
#        AZURE_SUBSCRIPTION_ID — Azure subscription ID
#   4. Optionally add variable AZURE_RESOURCE_GROUP (defaults to rg-aos-<env>)
#
# See deployment/workflow-templates/README.md in ASISaga/aos-infrastructure for full setup guide.

name: Deploy to Azure

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
  # Triggered automatically by ASISaga/aos-infrastructure after successful
  # Function App provisioning (Bicep Phase 4).  The payload includes the
  # environment name and Key Vault URL so that this workflow can retrieve
  # AZURE_CLIENT_ID without any manual secret setup.
  repository_dispatch:
    types:
      - infra_provisioned

permissions:
  id-token: write
  contents: read

jobs:
  resolve-env:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      key_vault_url: ${{ steps.env.outputs.key_vault_url }}
    steps:
      - name: Resolve deploy environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "environment=${{ github.event.client_payload.environment }}" >> "$GITHUB_OUTPUT"
            echo "key_vault_url=${{ github.event.client_payload.key_vault_url }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "key_vault_url=" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "key_vault_url=" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "key_vault_url=" >> "$GITHUB_OUTPUT"
          fi

  # GitHub Actions does not support dynamic `environment:` expressions (e.g.
  # ${{ needs.X.outputs.Y }}) when the job also calls a reusable workflow via
  # `uses:`.  The environment name must be a static string so that GitHub can
  # resolve environment secrets at workflow-planning time.  Three separate jobs
  # (one per environment) with static names and `if:` guards replace the single
  # dynamic job.

  deploy-dev:
    name: Deploy (dev)
    needs: resolve-env
    if: needs.resolve-env.outputs.environment == 'dev'
    environment: dev
    uses: ASISaga/aos-infrastructure/.github/workflows/deploy-function-app.yml@main
    with:
      app-name: 'mcp-subconscious'
      environment: 'dev'
      key-vault-url: ${{ needs.resolve-env.outputs.key_vault_url }}
    secrets: inherit

  deploy-staging:
    name: Deploy (staging)
    needs: resolve-env
    if: needs.resolve-env.outputs.environment == 'staging'
    environment: staging
    uses: ASISaga/aos-infrastructure/.github/workflows/deploy-function-app.yml@main
    with:
      app-name: 'mcp-subconscious'
      environment: 'staging'
      key-vault-url: ${{ needs.resolve-env.outputs.key_vault_url }}
    secrets: inherit

  deploy-prod:
    name: Deploy (prod)
    needs: resolve-env
    if: needs.resolve-env.outputs.environment == 'prod'
    environment: prod
    uses: ASISaga/aos-infrastructure/.github/workflows/deploy-function-app.yml@main
    with:
      app-name: 'mcp-subconscious'
      environment: 'prod'
      key-vault-url: ${{ needs.resolve-env.outputs.key_vault_url }}
    secrets: inherit
