# Deploy workflow for ASISaga/subconscious.asisaga.com
#
# Prerequisites — run once from ASISaga/aos-infrastructure:
#   1. Deploy infrastructure:  workflow_dispatch on infrastructure-deploy.yml
#      The Bicep templates create the Function App and its User-Assigned Managed
#      Identity, then store the identity clientId in Key Vault automatically.
#   2. Create GitHub Environments in THIS repo: dev, staging, prod
#   3. Add the following secrets to each environment:
#        AZURE_CLIENT_ID     — Managed identity client ID.
#                              Retrieve from Key Vault after infrastructure provisioning:
#                                KV_URL=https://<kv>.vault.azure.net \
#                                SECRET_NAME=clientid-mcp-subconscious-<env> \
#                                python3 .github/scripts/get_kv_client_id.py
#                              The Key Vault name is shown in the infrastructure deploy run summary.
#                              On the first run, the infra_provisioned repository_dispatch event
#                              triggers this workflow automatically with the client ID in the payload.
#        AZURE_TENANT_ID     — Azure AD tenant ID
#        AZURE_SUBSCRIPTION_ID — Azure subscription ID
#   4. Optionally add variable AZURE_RESOURCE_GROUP (defaults to rg-aos-<env>)
#
# Trigger matrix:
#   push to main          -> dev
#   release published     -> prod
#   workflow_dispatch     -> selected environment (dev / staging / prod)
#   repository_dispatch   -> environment from infra_provisioned payload
#
# Design note — why direct steps instead of a reusable workflow call:
#   GitHub Actions validates reusable-workflow jobs (uses:) at planning time.
#   When every job in a workflow uses uses: and is gated by an if: condition,
#   GitHub rejects the entire workflow at plan time — zero jobs run and no error
#   is emitted (silent failure). Static-environment step-based jobs avoid that
#   planning-time rejection and make environment-scoped secrets available.

name: Deploy to Azure

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
  repository_dispatch:
    types:
      - infra_provisioned

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Deploy (dev)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.environment == 'dev')
    runs-on: ubuntu-latest
    environment: dev
    env:
      APP_NAME: mcp-subconscious
      DEPLOY_ENV: dev
      KEY_VAULT_URL: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.key_vault_url || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log deployment context
        shell: bash
        run: |
          echo "::group::Deployment context"
          echo "  Application:  ${APP_NAME}"
          echo "  Environment:  ${DEPLOY_ENV}"
          echo "  Python:       3.11"
          echo "  Ref:          ${{ github.ref }}"
          echo "  SHA:          ${{ github.sha }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Event:        ${{ github.event_name }}"
          if [[ -n "${KEY_VAULT_URL}" ]]; then
            echo "  Key Vault:    ${KEY_VAULT_URL}"
          else
            echo "  Key Vault:    (using GitHub environment secret AZURE_CLIENT_ID)"
          fi
          echo "::endgroup::"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Azure SDK and build tools
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Installing Azure SDK and build tools"
          pip install --upgrade pip
          pip install \
            azure-identity \
            azure-keyvault-secrets \
            azure-mgmt-web
          echo "::endgroup::"

      - name: Install application dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f requirements.txt ]]; then
            echo "::error::requirements.txt not found — cannot install application dependencies"
            exit 1
          fi
          echo "::group::Installing application dependencies into .python_packages"
          pip install \
            --target=".python_packages/lib/site-packages" \
            --requirement requirements.txt \
            --verbose
          echo "--- Installed packages ---"
          pip list --path=".python_packages/lib/site-packages" 2>/dev/null || true
          echo "::endgroup::"

      - name: Azure Login (OIDC — bootstrap for Key Vault)
        if: env.KEY_VAULT_URL != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve AZURE_CLIENT_ID from Key Vault
        id: kv_client_id
        if: env.KEY_VAULT_URL != ''
        shell: bash
        env:
          KV_URL: ${{ env.KEY_VAULT_URL }}
          SECRET_NAME: clientid-mcp-subconscious-dev
          FALLBACK_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          echo "::group::Retrieving AZURE_CLIENT_ID from Key Vault"
          echo "  Key Vault URL: ${KV_URL}"
          echo "  Secret name:   ${SECRET_NAME}"

          CLIENT_ID=$(python3 .github/scripts/get_kv_client_id.py)

          if [[ -n "${CLIENT_ID}" ]]; then
            echo "client_id=${CLIENT_ID}" >> "$GITHUB_OUTPUT"
            echo "  AZURE_CLIENT_ID retrieved from Key Vault"
          else
            echo "client_id=${FALLBACK_CLIENT_ID}" >> "$GITHUB_OUTPUT"
            echo "  Key Vault secret not found; using GitHub environment secret AZURE_CLIENT_ID"
          fi
          echo "::endgroup::"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: >-
            ${{
              steps.kv_client_id.outputs.client_id != ''
              && steps.kv_client_id.outputs.client_id
              || secrets.AZURE_CLIENT_ID
            }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Function App name
        id: resolve
        shell: bash
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          export RESOURCE_GROUP="${AZURE_RESOURCE_GROUP:-rg-aos-${DEPLOY_ENV}}"
          export PREFIX="func-mcp-subconscious-${DEPLOY_ENV}-"

          echo "::group::Resolving Azure Function App"
          echo "  Subscription:   ${AZURE_SUBSCRIPTION_ID}"
          echo "  Resource group: ${RESOURCE_GROUP}"
          echo "  Name prefix:    ${PREFIX}"

          FUNCTION_APP=$(python3 .github/scripts/resolve_function_app.py) || {
            echo "::error::Run the infrastructure deployment from ASISaga/aos-infrastructure first."
            echo "::endgroup::"
            exit 1
          }

          echo "function_app=${FUNCTION_APP}" >> "$GITHUB_OUTPUT"
          echo "resource_group=${RESOURCE_GROUP}" >> "$GITHUB_OUTPUT"
          echo "  Target: ${FUNCTION_APP} (resource group: ${RESOURCE_GROUP})"
          echo "::endgroup::"

      - name: Deploy to Azure Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ steps.resolve.outputs.function_app }}
          package: .
          respect-funcignore: true
          scm-do-build-during-deployment: false

      - name: Report deployment success
        shell: bash
        run: |
          echo "::notice::${APP_NAME} deployed successfully"
          echo "::notice::Environment:    ${DEPLOY_ENV}"
          echo "::notice::Function App:   ${{ steps.resolve.outputs.function_app }}"
          echo "::notice::Resource Group: ${{ steps.resolve.outputs.resource_group }}"

  deploy-staging:
    name: Deploy (staging)
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging') ||
