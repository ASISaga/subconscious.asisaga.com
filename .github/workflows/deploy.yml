# Deploy workflow for ASISaga/subconscious.asisaga.com
#
# Prerequisites — run once from ASISaga/aos-infrastructure:
#   1. Deploy infrastructure:  workflow_dispatch on infrastructure-deploy.yml
#      The Bicep templates create the Function App and its User-Assigned Managed
#      Identity, then store the identity clientId in Key Vault automatically.
#   2. Create GitHub Environments in THIS repo: dev, staging, prod
#   3. Add the following secrets to each environment:
#        AZURE_CLIENT_ID     — Managed identity client ID.
#                              Retrieve from Key Vault after infrastructure provisioning:
#                                KV_URL=https://<kv>.vault.azure.net \
#                                SECRET_NAME=clientid-mcp-subconscious-<env> \
#                                python3 .github/scripts/get_kv_client_id.py
#                              The Key Vault name is shown in the infrastructure deploy run summary.
#                              On the first run, the infra_provisioned repository_dispatch event
#                              triggers this workflow automatically with the client ID in the payload.
#        AZURE_TENANT_ID     — Azure AD tenant ID
#        AZURE_SUBSCRIPTION_ID — Azure subscription ID
#   4. Optionally add variable AZURE_RESOURCE_GROUP (defaults to rg-aos-<env>)
#
# Trigger matrix:
#   push to main          -> dev
#   release published     -> prod
#   workflow_dispatch     -> selected environment (dev / staging / prod)
#   repository_dispatch   -> environment from infra_provisioned payload
#
# Design note — why direct steps instead of a reusable workflow call:
#   GitHub Actions validates reusable-workflow jobs (uses:) at planning time.
#   When every job in a workflow uses uses: and is gated by an if: condition,
#   GitHub rejects the entire workflow at plan time — zero jobs run and no error
#   is emitted (silent failure).  Implementing the deployment steps directly in
#   this file eliminates that class of planning-time rejection and allows full
#   control over logging and error reporting.

name: Deploy to Azure

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: staging
  # Triggered automatically by ASISaga/aos-infrastructure after successful
  # Function App provisioning (Bicep Phase 4).  The payload includes the
  # environment name and Key Vault URL so that this workflow can retrieve
  # AZURE_CLIENT_ID without any manual secret setup.
  repository_dispatch:
    types:
      - infra_provisioned

permissions:
  id-token: write
  contents: read

jobs:
  # Phase 1: Determine the target environment
  #
  # A dedicated job resolves the environment before the deploy job runs so that
  # the deploy job can reference needs.resolve-env.outputs.environment in its
  # environment: key.  Dynamic environment: is supported for regular step-based
  # jobs (unlike reusable-workflow jobs, where it caused planning-time failures).

  resolve-env:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      key_vault_url: ${{ steps.env.outputs.key_vault_url }}

    steps:
      - name: Determine target environment and Key Vault URL
        id: env
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Trigger context"
          echo "  Event:  ${{ github.event_name }}"
          echo "  Actor:  ${{ github.actor }}"
          echo "  Ref:    ${{ github.ref }}"
          echo "  SHA:    ${{ github.sha }}"
          echo "::endgroup::"

          ENV=""
          KV_URL=""

          case "${{ github.event_name }}" in
            push)
              ENV="dev"
              KV_URL=""
              echo "::notice::Push to main detected — targeting dev environment"
              ;;
            release)
              ENV="prod"
              KV_URL=""
              echo "::notice::Release published — targeting prod environment"
              ;;
            workflow_dispatch)
              ENV="${{ inputs.environment }}"
              KV_URL=""
              echo "::notice::Manual dispatch — targeting ${ENV} environment"
              ;;
            repository_dispatch)
              ENV="${{ github.event.client_payload.environment }}"
              KV_URL="${{ github.event.client_payload.key_vault_url }}"
              echo "::notice::Infrastructure provisioned — targeting ${ENV} environment"
              if [[ -n "${KV_URL}" ]]; then
                echo "::notice::Key Vault URL supplied: ${KV_URL}"
              fi
              ;;
            *)
              echo "::error::Unknown event type '${{ github.event_name }}' — cannot determine target environment"
              exit 1
              ;;
          esac

          if [[ -z "${ENV}" ]]; then
            echo "::error::Target environment resolved to empty string — check event payload"
            exit 1
          fi

          if [[ "${ENV}" != "dev" && "${ENV}" != "staging" && "${ENV}" != "prod" ]]; then
            echo "::error::Invalid environment '${ENV}' — must be dev, staging, or prod"
            exit 1
          fi

          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "key_vault_url=${KV_URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved target environment: ${ENV}"

  # Phase 2: Deploy

  deploy:
    name: Deploy (${{ needs.resolve-env.outputs.environment }})
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log deployment context
        shell: bash
        run: |
          echo "::group::Deployment context"
          echo "  Application:  mcp-subconscious"
          echo "  Environment:  ${{ needs.resolve-env.outputs.environment }}"
          echo "  Python:       3.11"
          echo "  Ref:          ${{ github.ref }}"
          echo "  SHA:          ${{ github.sha }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Event:        ${{ github.event_name }}"
          if [[ -n "${{ needs.resolve-env.outputs.key_vault_url }}" ]]; then
            echo "  Key Vault:    ${{ needs.resolve-env.outputs.key_vault_url }}"
          else
            echo "  Key Vault:    (using GitHub environment secret AZURE_CLIENT_ID)"
          fi
          echo "::endgroup::"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Azure SDK and build tools
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Installing Azure SDK and build tools"
          pip install --upgrade pip
          pip install \
            azure-identity \
            azure-keyvault-secrets \
            azure-mgmt-web
          echo "::endgroup::"

      - name: Install application dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f requirements.txt ]]; then
            echo "::error::requirements.txt not found — cannot install application dependencies"
            exit 1
          fi
          echo "::group::Installing application dependencies into .python_packages"
          pip install \
            --target=".python_packages/lib/site-packages" \
            --requirement requirements.txt \
            --verbose
          echo "--- Installed packages ---"
          pip list --path=".python_packages/lib/site-packages" 2>/dev/null || true
          echo "::endgroup::"

      # Bootstrap login is only needed when the infra_provisioned event supplies
      # a Key Vault URL so that this run can retrieve the managed-identity client
      # ID without a pre-existing GitHub environment secret.
      - name: Azure Login (OIDC — bootstrap for Key Vault)
        if: needs.resolve-env.outputs.key_vault_url != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve AZURE_CLIENT_ID from Key Vault
        id: kv_client_id
        if: needs.resolve-env.outputs.key_vault_url != ''
        shell: bash
        env:
          KV_URL: ${{ needs.resolve-env.outputs.key_vault_url }}
          SECRET_NAME: clientid-mcp-subconscious-${{ needs.resolve-env.outputs.environment }}
          FALLBACK_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          echo "::group::Retrieving AZURE_CLIENT_ID from Key Vault"
          echo "  Key Vault URL: ${KV_URL}"
          echo "  Secret name:   ${SECRET_NAME}"

          CLIENT_ID=$(python3 .github/scripts/get_kv_client_id.py)

          if [[ -n "${CLIENT_ID}" ]]; then
            echo "client_id=${CLIENT_ID}" >> "$GITHUB_OUTPUT"
            echo "  AZURE_CLIENT_ID retrieved from Key Vault"
          else
            echo "client_id=${FALLBACK_CLIENT_ID}" >> "$GITHUB_OUTPUT"
            echo "  Key Vault secret not found; using GitHub environment secret AZURE_CLIENT_ID"
          fi
          echo "::endgroup::"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          # Use the client ID retrieved from Key Vault when available; otherwise
          # fall back to the GitHub environment secret.  The kv_client_id step
          # always sets client_id to a non-empty value (either from KV or from
          # FALLBACK_CLIENT_ID), so the || here only applies when the step was
          # skipped entirely (key_vault_url was empty).
          client-id: >-
            ${{
              steps.kv_client_id.outputs.client_id != ''
              && steps.kv_client_id.outputs.client_id
              || secrets.AZURE_CLIENT_ID
            }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Function App name
        id: resolve
        shell: bash
        env:
          DEPLOY_ENV: ${{ needs.resolve-env.outputs.environment }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          export RESOURCE_GROUP="${AZURE_RESOURCE_GROUP:-rg-aos-${DEPLOY_ENV}}"
          export PREFIX="func-mcp-subconscious-${DEPLOY_ENV}-"

          echo "::group::Resolving Azure Function App"
          echo "  Subscription:   ${AZURE_SUBSCRIPTION_ID}"
          echo "  Resource group: ${RESOURCE_GROUP}"
          echo "  Name prefix:    ${PREFIX}"

          FUNCTION_APP=$(python3 .github/scripts/resolve_function_app.py) || {
            echo "::error::Run the infrastructure deployment from ASISaga/aos-infrastructure first."
            echo "::endgroup::"
            exit 1
          }

          echo "function_app=${FUNCTION_APP}"     >> "$GITHUB_OUTPUT"
          echo "resource_group=${RESOURCE_GROUP}" >> "$GITHUB_OUTPUT"
          echo "  Target: ${FUNCTION_APP} (resource group: ${RESOURCE_GROUP})"
          echo "::endgroup::"

      - name: Deploy to Azure Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ steps.resolve.outputs.function_app }}
          package: .
          respect-funcignore: true
          scm-do-build-during-deployment: false

      - name: Report deployment success
        shell: bash
        run: |
          echo "::notice::mcp-subconscious deployed successfully"
          echo "::notice::Environment:    ${{ needs.resolve-env.outputs.environment }}"
          echo "::notice::Function App:   ${{ steps.resolve.outputs.function_app }}"
          echo "::notice::Resource Group: ${{ steps.resolve.outputs.resource_group }}"
